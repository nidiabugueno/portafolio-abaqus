<!DOCTYPE html>
{% load static %}
<html lang="es" data-theme="light">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Portafolio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{% static 'css/style.css' %}?v=5">

</head>
<body>

<!-- Script inline y minimo para fijar el tema ANTES de pintar la pagina,
     asi se evita el parpadeo (flash) de tema claro -> oscuro al cargar. -->
<script>
    (function () {
        try {
            const temaGuardado = localStorage.getItem("portafolio_tema");
            if (temaGuardado === "dark") {
                document.documentElement.setAttribute("data-theme", "dark");
            }
        } catch (e) { /* almacenamiento no disponible, se ignora */ }
    })();
</script>

<div class="app-shell">

    <!-- ============================== -->
    <!-- Encabezado -->
    <!-- ============================== -->
    <header class="app-header">

        <div class="app-header__brand">
            <span class="app-header__mark">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><polygon points="12 3 21 8.5 3 8.5"></polygon><line x1="5" y1="8.5" x2="5" y2="19"></line><line x1="9.5" y1="8.5" x2="9.5" y2="19"></line><line x1="14.5" y1="8.5" x2="14.5" y2="19"></line><line x1="19" y1="8.5" x2="19" y2="19"></line><line x1="3" y1="21" x2="21" y2="21"></line></svg>
            </span>
            <div>
                <h1 class="app-header__title">Análisis del Portafolio</h1>
            </div>
        </div>

        <div class="app-header__actions">

            <div class="date-chip">
                <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <span id="fechaHoy"></span>
            </div>

            <button type="button" id="toggleTema" class="theme-toggle" aria-label="Cambiar tema claro / oscuro">
                <svg class="icon icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><line x1="12" y1="2" x2="12" y2="4"></line><line x1="12" y1="20" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"></line><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="4" y2="12"></line><line x1="20" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"></line><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"></line></svg>
                <svg class="icon icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>

        </div>

    </header>

    <main class="app-main">

        <!-- ============================== -->
        <!-- Panel de filtros -->
        <!-- ============================== -->
        <section class="panel filters-panel">

            <div class="filters-panel__field">
                <label class="field-label" for="portafolio">Portafolio</label>
                <div class="field-control">
                    <svg class="icon field-control__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h11l3 3v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><path d="M16 5v3a1 1 0 0 0 1 1h3"></path></svg>
                    <select class="form-select" id="portafolio">
                        <option value="1">Portafolio 1</option>
                        <option value="2">Portafolio 2</option>
                    </select>
                </div>
            </div>

            <div class="filters-panel__field">
                <label class="field-label" for="fecha_inicio">Fecha inicio</label>
                <div class="field-control">
                    <svg class="icon field-control__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    <input type="date" id="fecha_inicio" class="form-control" value="2022-02-15">
                </div>
            </div>

            <div class="filters-panel__field">
                <label class="field-label" for="fecha_fin">Fecha fin</label>
                <div class="field-control">
                    <svg class="icon field-control__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    <input type="date" id="fecha_fin" class="form-control" value="2023-02-16">
                </div>
            </div>

            <div class="filters-panel__field filters-panel__field--action">
                <button id="consultar" class="btn-consultar" type="button">
                    <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <span class="btn-consultar__text">Consultar</span>
                    <span class="btn-consultar__spinner" aria-hidden="true"></span>
                </button>
            </div>

        </section>

        <!-- ============================== -->
        <!-- Estado vacío / error -->
        <!-- ============================== -->
        <section id="estadoMensaje" class="state-message d-none">
            <p id="estadoMensajeTexto"></p>
        </section>

        <!-- ============================== -->
        <!-- Resumen de la consulta actual -->
        <!-- ============================== -->
        <section id="resumenConsulta" class="summary-bar d-none">
            <span class="summary-bar__portafolio" id="resumenPortafolio"></span>
            <span class="summary-bar__separador">&middot;</span>
            <span class="summary-bar__rango" id="resumenRango"></span>
        </section>

        <!-- ============================== -->
        <!-- Tarjetas KPI -->
        <!-- ============================== -->
        <section class="kpi-grid" id="kpiGrid">

            <article class="kpi-card">
                <span class="kpi-card__icon kpi-card__icon--blue">
                    <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                </span>
                <span class="kpi-card__body">
                    <span class="kpi-card__label">Valor inicial</span>
                    <span class="kpi-card__value" id="kpiValorInicial">&mdash;</span>
                </span>
            </article>

            <article class="kpi-card">
                <span class="kpi-card__icon kpi-card__icon--green">
                    <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
                </span>
                <span class="kpi-card__body">
                    <span class="kpi-card__label">Valor final</span>
                    <span class="kpi-card__value" id="kpiValorFinal">&mdash;</span>
                </span>
            </article>

            <article class="kpi-card">
                <span class="kpi-card__icon kpi-card__icon--violet">
                    <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="5" x2="5" y2="19"></line><circle cx="6.5" cy="6.5" r="2.5"></circle><circle cx="17.5" cy="17.5" r="2.5"></circle></svg>
                </span>
                <span class="kpi-card__body">
                    <span class="kpi-card__label">Rentabilidad del periodo</span>
                    <span class="kpi-card__value" id="kpiRentabilidad">&mdash;</span>
                </span>
            </article>

            <article class="kpi-card">
                <span class="kpi-card__icon kpi-card__icon--blue">
                    <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                </span>
                <span class="kpi-card__body">
                    <span class="kpi-card__label">Activos en el portafolio</span>
                    <span class="kpi-card__value" id="kpiActivos">&mdash;</span>
                </span>
            </article>

        </section>

        <!-- ============================== -->
        <!-- Gráfico de valor -->
        <!-- ============================== -->
        <section class="panel chart-panel">
            <div class="chart-panel__header">
                <div>
                    <h2 class="chart-panel__title">Valor del portafolio</h2>
                    <p class="chart-panel__subtitle">Evolución diaria en el rango seleccionado</p>
                </div>
                <button type="button" class="btn-descargar" id="descargarGraficoValor" disabled>
                    <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    <span>Descargar PNG</span>
                </button>
            </div>
            <div class="chart-panel__canvas-wrap chart-panel__canvas-wrap--line">
                <canvas id="graficoValor"></canvas>
            </div>
        </section>

        <!-- ============================== -->
        <!-- Gráfico de composición -->
        <!-- ============================== -->
        <section class="panel chart-panel">
            <div class="chart-panel__header">
                <div>
                    <h2 class="chart-panel__title">Composición por activo</h2>
                    <p class="chart-panel__subtitle">Peso relativo de cada activo</p>
                </div>
                <button type="button" class="btn-descargar" id="descargarGraficoWeights" disabled>
                    <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    <span>Descargar PNG</span>
                </button>
            </div>
            <div id="leyendaActivos" class="legend-row"></div>
            <div class="chart-panel__canvas-wrap chart-panel__canvas-wrap--area">
                <canvas id="graficoWeights"></canvas>
            </div>
        </section>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="{% static 'js/dashboard.js' %}?v=3"></script>

</body>
</html>
